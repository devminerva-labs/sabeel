<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a472a" />
    <!-- Apply theme before React hydrates to avoid flash of wrong theme -->
    <script>
      ;(function () {
        var t = localStorage.getItem('sabeel-theme')
        var dark = t === 'dark' || (t === 'system' || !t) && window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
    <meta name="description" content="Track your Quran recitation and Adhkar this Ramadan" />

    <!-- Open Graph / WhatsApp / Social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sabeel - Ramadan Companion" />
    <meta property="og:description" content="Track your Quran recitation and Adhkar this Ramadan. Join a Halaqah and progress together." />
    <meta property="og:image" content="https://sabeel.devminerva2001.workers.dev/og-image.png" />
    <meta property="og:url" content="https://sabeel.devminerva2001.workers.dev" />
    <meta property="og:site_name" content="Sabeel" />

    <!-- Apple-specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sabeel" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/fonts/scheherazade-new.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/noto-naskh-arabic-variable.woff2" as="font" type="font/woff2" crossorigin />
    <title>Sabeel - Ramadan Companion</title>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
